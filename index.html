<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>体のパーツを当てよう</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#fff7df;
  text-align:center;
  color:#263044;
}

.wrap{
  max-width:420px;
  margin:auto;
  padding:20px;
}

h1{
  color:#ff8c00;
  font-size:26px;
}

.face-area{
  position:relative;
  width:330px;
  margin:20px auto;
}

.face-img{
  width:100%;
  display:block;
}

.tap{
  position:absolute;
  border:3px solid #4dabf7;
  background:rgba(77,171,247,0.15);
  border-radius:50%;
  cursor:pointer;

  display:flex;
  align-items:center;
  justify-content:center;

  color:#1565c0;
  font-size:13px;
  font-weight:bold;

  transition:all 0.15s;
}

.tap:active{
  transform:scale(1.1);
  background:rgba(77,171,247,0.3);
}


/* 前向きの体 */
.neck{ top:35%; left:56%; width:12%; height:5%; }

.shoulder-left{ top:38%; left:44%; width:15%; height:6%; }
.shoulder-right{ top:38%; left:70%; width:15%; height:6%; }

.chest{ top:43%; left:56%; width:14%; height:7%; }

.arm-left{ top:49%; left:37%; width:10%; height:14%; }
.arm-right{ top:49%; left:74%; width:10%; height:14%; }

.hand-left{ top:60%; left:35%; width:10%; height:5%; }
.hand-right{ top:60%; left:76%; width:10%; height:5%; }

.finger-left{ top:63%; left:40%; width:9%; height:5%; }
.finger-right{ top:63%; left:70%; width:9%; height:5%; }

.leg-left{ top:80%; left:47%; width:10%; height:9%; }
.leg-right{ top:80%; left:64%; width:10%; height:9%; }

.knee-left{ top:73%; left:49%; width:10%; height:5%; }
.knee-right{ top:73%; left:64%; width:10%; height:5%; }

.foot-left{ top:90%; left:44%; width:14%; height:5%; }
.foot-right{ top:90%; left:67%; width:14%; height:5%; }

/* 左上の後ろ姿 */
.back{ top:23%; left:18%; width:14%; height:13%; }




.result{
  background:#fff;
  border:4px solid #8ecae6;
  border-radius:24px;
  padding:20px;
  margin-top:16px;
}

.word{
  font-size:44px;
  font-weight:bold;
  color:#fb8500;
}

.ja{
  font-size:22px;
  margin-top:8px;
}

  .quiz-btn{
  border:none;
  background:#ffb703;
  color:#263044;
  font-size:18px;
  font-weight:bold;
  padding:12px 20px;
  border-radius:24px;
  box-shadow:0 4px 0 #d89b00;
  cursor:pointer;
}

.quiz-btn:active{
  transform:translateY(3px);
  box-shadow:0 1px 0 #d89b00;
}

.message{
  margin-top:10px;
  font-size:16px;
  font-weight:bold;
}
  
</style>
</head>

<body>
<div class="wrap">

  <h1>体のパーツを当てよう！</h1>
  <p>体のパーツをタップしてね</p>
  <button class="quiz-btn" onclick="startQuiz()">🔊 もんだいをきく</button>
<div class="message" id="message">音を聞いて、同じパーツをタップしてね</div>

  <div class="face-area">
    <img src="C0EE03F6-B841-4F2B-BEAF-A8DD9C71AE4F.png" class="face-img" alt="顔のイラスト">

<!-- 体の中をタップ -->
<button class="tap neck" onclick="showWord('neck','首')"></button>

<button class="tap shoulder-left" onclick="showWord('shoulder','肩')"></button>
<button class="tap shoulder-right" onclick="showWord('shoulder','肩')"></button>

<button class="tap chest" onclick="showWord('chest','胸')"></button>

<button class="tap arm-left" onclick="showWord('arm','腕')"></button>
<button class="tap arm-right" onclick="showWord('arm','腕')"></button>

<button class="tap hand-left" onclick="showWord('hand','手')"></button>
<button class="tap hand-right" onclick="showWord('hand','手')"></button>

<button class="tap finger-left" onclick="showWord('finger','指')"></button>
<button class="tap finger-right" onclick="showWord('finger','指')"></button>

<button class="tap leg-left" onclick="showWord('leg','足')"></button>
<button class="tap leg-right" onclick="showWord('leg','足')"></button>

<button class="tap knee-left" onclick="showWord('knee','ひざ')"></button>
<button class="tap knee-right" onclick="showWord('knee','ひざ')"></button>

<button class="tap foot-left" onclick="showWord('foot','足先')"></button>
<button class="tap foot-right" onclick="showWord('foot','足先')"></button>

<button class="tap back" onclick="showWord('back','背中')"></button>
</div>
    

  <div class="result">
    <div class="word" id="word">Tap!</div>
    <div class="ja" id="ja">タップしてね</div>
  </div>

</div>

<script>
const quizWords = [
  { word:'eye', japanese:'目' },
  { word:'eyebrow', japanese:'眉毛' },
  { word:'nose', japanese:'鼻' },
  { word:'mouth', japanese:'口' },
  { word:'ear', japanese:'耳' },
  { word:'hair', japanese:'髪の毛' },
  { word:'head', japanese:'頭' },
  { word:'face', japanese:'顔' }
];

let currentQuiz = null;
let quizMode = false;

function speak(text, lang){
  const voice = new SpeechSynthesisUtterance(text);
  voice.lang = lang;
  voice.rate = lang === "en-US" ? 0.8 : 0.9;
  speechSynthesis.speak(voice);
}

function speakEnglishAndJapanese(word, japanese){
  speechSynthesis.cancel();

  const english = new SpeechSynthesisUtterance(word);
  english.lang = "en-US";
  english.rate = 0.8;

  const japaneseVoice = new SpeechSynthesisUtterance(japanese);
  japaneseVoice.lang = "ja-JP";
  japaneseVoice.rate = 0.9;

  english.onend = () => {
    speechSynthesis.speak(japaneseVoice);
  };

  speechSynthesis.speak(english);
}

function showWord(word, japanese){
  document.getElementById("word").textContent = word;
  document.getElementById("ja").textContent = japanese;

  if(quizMode){
    checkAnswer(word, japanese);
  }else{
    speakEnglishAndJapanese(word, japanese);
  }
}

function startQuiz(){
  quizMode = true;

  const randomIndex = Math.floor(Math.random() * quizWords.length);
  currentQuiz = quizWords[randomIndex];

  document.getElementById("word").textContent = "???";
  document.getElementById("ja").textContent = "どこかな？";
  document.getElementById("message").textContent = "音を聞いて、パーツをタップしてね";

  speechSynthesis.cancel();

  const question = new SpeechSynthesisUtterance(currentQuiz.word);
  question.lang = "en-US";
  question.rate = 0.75;

  speechSynthesis.speak(question);
}

function checkAnswer(word, japanese){
  if(!currentQuiz) return;

  if(word === currentQuiz.word){
    document.getElementById("word").textContent = "Good!";
    document.getElementById("ja").textContent = "せいかい！";
    document.getElementById("message").textContent = "🎉 せいかい！";

    speakEnglishAndJapanese(word, japanese);

    quizMode = false;
    currentQuiz = null;
  }else{
    document.getElementById("word").textContent = "Try again";
    document.getElementById("ja").textContent = "もういちど";
    document.getElementById("message").textContent = "もう一回聞いてみよう";

    speechSynthesis.cancel();

    const again = new SpeechSynthesisUtterance("try again");
    again.lang = "en-US";
    again.rate = 0.8;

    again.onend = () => {
      if(currentQuiz){
        const repeat = new SpeechSynthesisUtterance(currentQuiz.word);
        repeat.lang = "en-US";
        repeat.rate = 0.75;
        speechSynthesis.speak(repeat);
      }
    };

    speechSynthesis.speak(again);
  }
}
</script>

</body>
</html>
